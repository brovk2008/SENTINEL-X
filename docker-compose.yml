version: '3.8'

services:
  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: safetyos-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  # ─── Frontend Next.js ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safetyos-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safetyos-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/safetyos
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=safetyos_graph_db
      - CHROMADB_HOST=chroma
      - CHROMADB_PORT=8000
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - DEFAULT_LLM_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - mqtt

  # ─── Databases & Message Broker ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: safetyos-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=safetyos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: safetyos-redis
    ports:
      - "6379:6379"

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: safetyos-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt-broker/mosquitto.conf:/mosquitto/config/mosquitto.conf

  chroma:
    image: chromadb/chroma:latest
    container_name: safetyos-chroma
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/data

  neo4j:
    image: neo4j:5-community
    container_name: safetyos-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/safetyos_graph_db
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  chroma_data:
  neo4j_data:
